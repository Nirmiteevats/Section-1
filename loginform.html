<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link
        href="https://fonts.googleapis.com/css?family=Roboto:100,200,300,regular,500,600,700,800,900,100italic,200italic,300italic,italic,500italic,600italic,700italic,800italic,900italic"
        rel="stylesheet" />

    <style>
        * {
            font-family: roboto;
        }

        .card {
            border: 2px solid red;
            width: 20%;
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            /* x-offset y-offset blur size color */
            box-shadow: 3px 3px 5px 0px rgba(0, 0, 0, 0.397);

        }

        body {
            display: flex;
            /* for horizontal center alignment use justify-content: center; */
            justify-content: center;
            /* for vertical center alignment use align-items:center;  */

            align-items: center;

            height: 100vh;
            /* background-color: lightgray; */
            /* background-image: linear-gradient(0deg, rgb(142, 142, 218), #e4a6a6,yellow); */
            /* background-image: url('https://images.unsplash.com/photo-1497032628192-86f99bcd76bc?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8ZGVzayUyMGVzc2VudGlhbHN8ZW58MHx8MHx8fDA%3D'); */
            background-size: cover;
            
            background-image: linear-gradient(48deg, #fffdfd69,#1414019d),url('https://images.unsplash.com/photo-1497032628192-86f99bcd76bc?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8ZGVzayUyMGVzc2VudGlhbHN8ZW58MHx8MHx8fDA%3D');
        }

        .form-title {

            text-align: center;
            font-size: 30px;
        }

        .text-input {
            display: block;
            width: 100%;
            /* padding-top: 10px; */
            padding: 10px 20px;
            border-radius: 5px;
            box-sizing: border-box;
            margin-bottom: 30px;
            margin-top: 5px;
            border: none;
            border: 1px solid black;
        }

        .btn-submit {
            background-color: blueviolet;
            color: white;
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        .link {
            text-decoration: none;
            color: blueviolet;
            display: block;
            margin: 10px 0;
        }
        .forget-link{
            text-align: right;
        }
        .signup-link{
            text-align: center;
        }
    </style>


</head>


<body>

    <div class="card">
        <h2 class="form-title">Login Form</h2>

        <form>
            <label for="">Email address</label>
            <input class="text-input" type="email">

            <label for="">Password</label>
            <input class="text-input" type="password">

            <a href="#" class="link forget-link">Forgot password</a>

            <button class="btn-submit">Submit</button>

            <a href="#" class="link signup-link">Not Registered Yet? Signup Now</a>
        </form>
    </div>


</body>

</html>
